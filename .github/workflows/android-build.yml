name: Android Release Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Fix Capacitor Java version
        run: |
          sed -i 's/VERSION_21/VERSION_17/g' node_modules/@capacitor/android/capacitor/build.gradle

      - name: Create cordova plugins stub
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main/libs
          echo "// Empty cordova variables" > android/capacitor-cordova-android-plugins/cordova.variables.gradle
          echo 'configurations.maybeCreate("default")' > android/capacitor-cordova-android-plugins/build.gradle
          echo 'artifacts.add("default", file("dummy.jar"))' >> android/capacitor-cordova-android-plugins/build.gradle
          cd android/capacitor-cordova-android-plugins
          python3 -c "
          import zipfile
          with zipfile.ZipFile('dummy.jar', 'w') as zf:
              zf.writestr('META-INF/MANIFEST.MF', 'Manifest-Version: 1.0\n')
          "

      - name: Generate signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          else
            cd android/app
            keytool -genkeypair -v -keystore release.keystore -alias octave \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass octave123 -keypass octave123 \
              -dname "CN=Octave Streaming, OU=Dev, O=Octave, L=Dhaka, ST=Dhaka, C=BD"
          fi

      - name: Grant execute permission
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" android/app/build.gradle | grep -oP '"\K[^"]+' | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Octave-v${{ steps.version.outputs.version }}-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
          name: Octave v${{ steps.version.outputs.version }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}