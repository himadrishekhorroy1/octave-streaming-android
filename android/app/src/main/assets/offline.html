<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octave</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #121212;
            --bg-card: #181818;
            --bg-elevated: #1e1e1e;
            --bg-hover: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-subdued: #6a6a6a;
            --accent: #7c3aed;
            --accent-light: #8b5cf6;
            --accent-dim: #5b21b6;
            --divider: #282828;
            --skeleton-base: #282828;
            --skeleton-shine: #3a3a3a;
            --nav-height: 64px;
            --sidebar-width: 280px;
            --bottom-bar-height: 72px;
            --player-bar-height: 64px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== TOP NAVIGATION BAR ========== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hamburger-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: none;
            cursor: pointer;
        }

        .hamburger-btn svg { width: 18px; height: 18px; fill: var(--text-primary); }

        .app-brand {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-light), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 4px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-tab {
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 20px;
            white-space: nowrap;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-tab.active {
            color: var(--text-primary);
            background: rgba(255,255,255,0.07);
        }

        .nav-tab svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-icon-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: none;
            cursor: pointer;
        }

        .nav-icon-btn svg { width: 16px; height: 16px; fill: var(--text-secondary); }

        /* ========== SIDEBAR ========== */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            max-width: 85vw;
            background: var(--bg-secondary);
            z-index: 201;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 0;
            border-right: 1px solid var(--divider);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-section {
            padding: 0 12px;
            margin-bottom: 24px;
        }

        .sidebar-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-subdued);
            padding: 8px 12px 12px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .sidebar-item:hover, .sidebar-item:active {
            background: rgba(255,255,255,0.07);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            color: var(--text-primary);
            background: rgba(255,255,255,0.07);
        }

        .sidebar-item svg { width: 22px; height: 22px; fill: currentColor; flex-shrink: 0; }

        .sidebar-item-label { flex: 1; }

        .sidebar-item-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        .sidebar-pinned-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 12px;
        }

        .pinned-card {
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            transition: background 0.15s;
            height: 64px;
        }

        .pinned-card:hover { background: rgba(255,255,255,0.08); }

        .pinned-add {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 64px;
        }

        .pinned-add svg { width: 20px; height: 20px; fill: var(--text-subdued); }

        .sidebar-credit {
            padding: 16px 24px 8px;
            font-size: 11px;
            color: var(--text-subdued);
            text-align: center;
        }

        .sidebar-credit a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
        }

        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 8px 12px 0;
            border-top: 1px solid var(--divider);
        }

        .sidebar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .sidebar-profile-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sidebar-profile-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .sidebar-profile-actions button {
            width: 28px;
            height: 28px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .sidebar-profile-actions button svg { width: 16px; height: 16px; fill: var(--text-secondary); }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            right: 0;
            bottom: calc(var(--player-bar-height) + var(--safe-bottom));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        .content-header {
            margin-bottom: 24px;
        }

        .content-greeting {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .content-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Section */
        .content-section {
            margin-bottom: 32px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
        }

        .section-see-all {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* Horizontal scroll cards */
        .card-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
        }

        .card-row::-webkit-scrollbar { display: none; }

        .music-card {
            flex-shrink: 0;
            width: 140px;
            scroll-snap-align: start;
            cursor: pointer;
        }

        .music-card-img {
            width: 140px;
            height: 140px;
            border-radius: 8px;
            background: var(--skeleton-base);
            position: relative;
            overflow: hidden;
        }

        .music-card-img.skeleton {
            background: linear-gradient(110deg, var(--skeleton-base) 30%, var(--skeleton-shine) 50%, var(--skeleton-base) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        .music-card-title {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-card-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* List rows */
        .list-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            cursor: pointer;
        }

        .list-row-num {
            width: 20px;
            text-align: center;
            font-size: 14px;
            color: var(--text-subdued);
            flex-shrink: 0;
        }

        .list-row-img {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .list-row-img.skeleton {
            background: linear-gradient(110deg, var(--skeleton-base) 30%, var(--skeleton-shine) 50%, var(--skeleton-base) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        .list-row-info { flex: 1; min-width: 0; }

        .list-row-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-row-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-row-duration {
            font-size: 12px;
            color: var(--text-subdued);
            flex-shrink: 0;
        }

        .list-row-more {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .list-row-more svg { width: 16px; height: 16px; fill: var(--text-subdued); }

        /* ========== BOTTOM PLAYER BAR ========== */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(var(--player-bar-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--bg-tertiary);
            border-top: 1px solid var(--divider);
            display: flex;
            align-items: center;
            padding-left: 12px;
            padding-right: 12px;
            z-index: 100;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .player-album-art {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: var(--skeleton-base);
            flex-shrink: 0;
        }

        .player-album-art.skeleton {
            background: linear-gradient(110deg, var(--skeleton-base) 30%, var(--skeleton-shine) 50%, var(--skeleton-base) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        .player-track-info { min-width: 0; }

        .player-track-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-track-artist {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-center {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .player-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 50%;
        }

        .player-btn svg { width: 20px; height: 20px; fill: var(--text-primary); }

        .player-btn.play-btn {
            width: 36px;
            height: 36px;
            background: var(--text-primary);
            border-radius: 50%;
        }

        .player-btn.play-btn svg { width: 18px; height: 18px; fill: var(--bg-primary); }

        .player-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .player-right-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            cursor: pointer;
        }

        .player-right-btn svg { width: 16px; height: 16px; fill: var(--text-secondary); }

        /* ========== OFFLINE BANNER ========== */
        .offline-banner {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            right: 0;
            height: 36px;
            background: linear-gradient(90deg, var(--accent-dim), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 99;
            animation: slideDown 0.3s ease-out;
        }

        .offline-banner svg { width: 14px; height: 14px; fill: white; }

        .offline-banner span {
            font-size: 12px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.3px;
        }

        .offline-banner .retry-link {
            color: white;
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
            margin-left: 4px;
        }

        /* ========== SKELETON ANIMATIONS ========== */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Skeleton text lines */
        .skeleton-text {
            height: 14px;
            border-radius: 4px;
            background: linear-gradient(110deg, var(--skeleton-base) 30%, var(--skeleton-shine) 50%, var(--skeleton-base) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        .skeleton-text.w-60 { width: 60%; }
        .skeleton-text.w-40 { width: 40%; }
        .skeleton-text.w-80 { width: 80%; }
        .skeleton-text.w-50 { width: 50%; }
        .skeleton-text.w-70 { width: 70%; }
        .skeleton-text.w-30 { width: 30%; }
        .skeleton-text.h-lg { height: 18px; }

        /* ========== RESPONSIVE MOBILE ========== */
        @media (max-width: 768px) {
            .nav-center {
                display: none;
            }
            .app-brand {
                font-size: 20px;
            }
            .music-card {
                width: 120px;
            }
            .music-card-img {
                width: 120px;
                height: 120px;
            }
            .content-greeting {
                font-size: 20px;
            }
            .section-title {
                font-size: 18px;
            }
        }

        @media (max-width: 360px) {
            .music-card {
                width: 110px;
            }
            .music-card-img {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION BAR -->
    <div class="top-nav">
        <div class="nav-left">
            <button class="hamburger-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <span class="app-brand">Octave</span>
        </div>

        <div class="nav-center">
            <button class="nav-tab active">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Home
            </button>
            <button class="nav-tab">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                Search
            </button>
            <button class="nav-tab">
                <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
                Browse
            </button>
            <button class="nav-tab">
                <svg viewBox="0 0 24 24"><path d="M3.24 6.15C2.51 6.43 2 7.17 2 8v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2H8.3l8.26-3.34-.37-.92L3.24 6.15zM7 20c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm13-8h-2v-2h-2v2H4V8h16v4z"/></svg>
                Radio
            </button>
            <button class="nav-tab">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                Podcasts
            </button>
            <button class="nav-tab">
                <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
                Library
            </button>
        </div>

        <div class="nav-right">
            <button class="nav-icon-btn">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </button>
        </div>
    </div>

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-section-title">Pinned</div>
            <div class="sidebar-pinned-grid">
                <div class="pinned-add">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </div>
            </div>
        </div>

        <div class="sidebar-credit">
            Made by <a href="#">CloakGPT</a>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-item active">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="sidebar-item-label">Home</span>
            </div>
            <div class="sidebar-item">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <span class="sidebar-item-label">Liked Songs</span>
            </div>
            <div class="sidebar-item">
                <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
                <span class="sidebar-item-label">Your Playlists</span>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        // Nav tab switching
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Auto-hide banner after 5 seconds
        setTimeout(() => {
            const banner = document.getElementById('offlineBanner');
            banner.style.transition = 'transform 0.3s ease-in, opacity 0.3s';
            banner.style.transform = 'translateY(-100%)';
            banner.style.opacity = '0';
            setTimeout(() => {
                banner.style.display = 'none';
                // Adjust main content top
                document.querySelector('.main-content').style.top = 'var(--nav-height)';
            }, 300);
        }, 5000);
