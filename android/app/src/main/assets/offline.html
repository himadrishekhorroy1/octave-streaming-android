<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Octave - Offline</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #1DB954; /* Spotify-like green for familiarity or use previous pink */
            --nav-bg: #121212;
            --card-bg: #181818;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .app-logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }
        .offline-illustration {
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
            opacity: 0.8;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px 0;
        }
        p {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.4;
            margin: 0 0 32px 0;
            max-width: 280px;
        }
        .retry-button {
            background-color: var(--text-primary);
            color: #000;
            border: none;
            padding: 14px 48px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .retry-button:active {
            transform: scale(0.96);
            background-color: #e0e0e0;
        }
        .nav-bar {
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            border-top: 1px solid #282828;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            flex: 1;
            gap: 4px;
        }
        .nav-icon {
            font-size: 24px;
        }
        .nav-item.active {
            color: var(--text-primary);
        }
        /* Skeleton loading effect for native feel */
        .skeleton-row {
            width: 100%;
            height: 60px;
            background: var(--card-bg);
            margin-bottom: 8px;
            border-radius: 4px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-logo">Octave</div>
        <div style="font-size: 20px;">⚙️</div>
    </div>
    
    <div class="content">
        <svg class="offline-illustration" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
        <h1>No connection</h1>
        <p>Connect to the internet to play your favorite tracks.</p>
        <button class="retry-button" onclick="window.location.reload()">Try again</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔍</div>
            <span>Search</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📚</div>
            <span>Library</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🎙️</div>
            <span>Radio</span>
        </div>
    </div>
</body>
</html>
