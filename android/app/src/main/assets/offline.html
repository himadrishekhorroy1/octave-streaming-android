<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octave - Offline</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #ff4d6d;
            --card-bg: #1e1e1e;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo {
            height: 32px;
            width: 32px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        .app-name {
            font-size: 20px;
            font-weight: bold;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .retry-button {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .retry-button:active {
            transform: scale(0.95);
        }
        .nav-bar {
            background-color: #000000;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #282828;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 10px;
            gap: 4px;
        }
        .nav-icon {
            font-size: 20px;
        }
        .nav-item.active {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">O</div>
        <div class="app-name">Octave</div>
    </div>
    <div class="content">
        <div class="offline-icon">📶</div>
        <h1>You're offline</h1>
        <p>Check your connection and try again to keep streaming your favorite music.</p>
        <button class="retry-button" onclick="window.location.reload()">Retry</button>
    </div>
    <div class="nav-bar">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔍</div>
            <span>Search</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📚</div>
            <span>Library</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🎙️</div>
            <span>Radio</span>
        </div>
    </div>
</body>
</html>
